<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCII艺术字 实时时钟</title>
    <script src="https://cdn.jsdelivr.net/npm/figlet/lib/figlet.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box; /* 确保内边距和边框不会增加元素的总宽度 */
        }

        /* ==================== 页面主体样式 ==================== */
        /* 使用 Flexbox 实现全屏居中布局 */
        body {
            background: #000000; /* 纯黑背景 */
            min-height: 100vh;    /* 确保页面至少占满整个视口高度 */
            display: flex;         /* 启用 Flex 布局 */
            flex-direction: column;/* 子元素垂直排列 */
            align-items: center;   /* 水平居中 */
            justify-content: center;/* 垂直居中 */
            font-family: 'Courier New', Consolas, monospace; /* 等宽字体，保证 ASCII 对齐 */
            padding: 2rem;         /* 适当内边距，防止在小屏幕上内容贴边 */
        }

        /* ==================== 时钟头部标题样式 ==================== */
        .clock-header {
            text-align: center;
            color: #60a5fa;
            font-size: 1.5rem;
            letter-spacing: 0.2em; /* 增加字间距，提升质感 */
            font-weight: bold;
            margin-bottom: 3rem;   /* 与下方内容保持距离 */
        }

        /* ==================== 每个时钟区块的容器样式 ==================== */
        .clock-block {
            text-align: center;     /* 让区块内的文字和标签全部居中 */
            margin-bottom: 2.5rem;  /* 区块之间的垂直间距 */
            width: 100%;            /* 占满宽度，确保内部居中生效 */
        }

        /* [DATE]、[DAY]、[TIME] */
        .block-label {
            color: #d9b38c;       /* 暖棕色/金色，复古终端风格 */
            font-size: 1.2rem;
            font-weight: 600;
            display: block;        /* 独占一行 */
            margin-bottom: 1rem;   /* 与下方 ASCII 字保持距离 */
        }

        /* ==================== ASCII 艺术字容器样式 ==================== */
        pre {
            font-size: 16px;       /* ASCII 字大小，可根据屏幕调整 */
            line-height: 1.15;     /* 行高稍紧凑，保证 ASCII 图形连贯性 */
            color: #86efac;        /* 薄荷绿/荧光绿，经典终端色 */
            white-space: pre;      /* 保留空白和换行，这是 ASCII 艺术的关键 */
            overflow-x: auto;      /* 如果屏幕太窄，允许横向滚动 */
            text-align: center;     /* 关键：让 ASCII 艺术字内容居中对齐 */
            margin: 0 auto;         /* 确保 pre 元素本身在父容器中居中 */
            display: inline-block;  /* 配合 margin: auto 实现居中 */
        }

        /* ==================== 右上角模式切换按钮 ==================== */
        .mode-toggle-btn {
            position: fixed;        /* 固定定位，悬浮在视口右上角 */
            top: 1.25rem;
            right: 1.25rem;
            padding: 0.6rem 1rem;
            border-radius: 999px;   /* 胶囊形状 */
            border: 1px solid #4ade80;
            background: rgba(13, 18, 13, 0.85); /* 半透明深绿背景 */
            color: #bbf7d0;
            font-family: inherit;   /* 继承页面的等宽字体 */
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s ease; /* 平滑过渡动画 */
            z-index: 1000;          /* 确保在最上层 */
        }

        /* 按钮悬停效果 */
        .mode-toggle-btn:hover {
            background: rgba(55, 85, 55, 0.5);
            box-shadow: 0 0 0 2px rgba(74, 222, 128, 0.5); /* 发光外圈 */
        }

        /* 按钮点击效果 */
        .mode-toggle-btn:active {
            transform: scale(0.95); /* 按下时稍微缩小 */
        }
    </style>
</head>
<body>
    <!-- 模式切换按钮：控制是否显示毫秒 -->
    <button id="mode-toggle" class="mode-toggle-btn" type="button">显示/隐藏毫秒</button>

    <div class="clock-header">
        REALTIME SYSTEM DATE/CLOCK
    </div>

    <!-- ==================== 日期显示区块 ==================== -->
    <div class="clock-block">
        <span class="block-label">[DATE]</span>
        <pre id="date-ascii"></pre> <!-- ASCII 艺术字将渲染在这里 -->
    </div>

    <!-- ==================== 星期显示区块 ==================== -->
    <div class="clock-block">
        <span class="block-label">[DAY]</span>
        <pre id="day-ascii"></pre>
    </div>

    <!-- ==================== 时间显示区块 ==================== -->
    <div class="clock-block">
        <span class="block-label">[TIME]</span>
        <pre id="time-ascii"></pre>
    </div>

    <script>
        // ==================== 初始化与配置 ====================

        /* 
           配置 figlet.js 的字体路径
           注意：由于我们使用 CDN 引入，且字体文件通常需要单独加载，
           这里的路径配置主要是为了代码完整性。
           如果要在本地完美运行，需要下载 .flf 字体文件到 ./fonts/ 目录。
        */
        figlet.defaults({
            fontPath: "./fonts/"
        });

        // 统一的 ASCII 字体配置
        const FONT_CONFIG = {
            font: 'Slant',
            horizontalLayout: 'full' // 布局：'full' 表示保留字符宽度，不挤压
        };

        // ==================== 全局状态变量 ====================

        // 模式控制：true 为显示毫秒（高速刷新），false 为普通模式（只显示秒）
        let showMilliseconds = true;
        
        // 定时器 ID，用于清除和重启定时器
        let timerId = null;

        // ==================== 工具函数 ====================

        /**
         * 补零工具函数
         * 例如：将 5 变成 "05"，将 9 变成 "009"
         * @param {number} num - 输入的数字
         * @param {number} [len=2] - 补零后的长度，默认为2
         * @returns {string} 补零后的字符串
         */
        function padZero(num, len = 2) {
            return String(num).padStart(len, '0');
        }

        // ==================== 核心时钟逻辑 ====================

        /**
         * 更新时钟的核心函数
         * 1. 获取当前时间
         * 2. 格式化字符串
         * 3. 调用 figlet 生成 ASCII 艺术字
         * 4. 更新 DOM
         */
        async function updateClock() {
            const now = new Date(); // 获取当前系统时间对象

            // 1. 处理日期 (YYYY-MM-DD)
            const year = now.getFullYear();
            const month = padZero(now.getMonth() + 1); // 月份是 0-11，所以要 +1
            const day = padZero(now.getDate());
            const dateStr = `${year}-${month}-${day}`;

            // 2. 处理星期 (如 "Monday", "Friday")
            // 使用 toLocaleDateString 直接获取英文星期全称
            const weekdayStr = now.toLocaleDateString('en-US', { weekday: 'long' });

            // 3. 处理时间（可切换毫秒显示）
            const hours = padZero(now.getHours());
            const minutes = padZero(now.getMinutes());
            const seconds = padZero(now.getSeconds());
            const milliseconds = padZero(now.getMilliseconds(), 3); // 毫秒强制3位数
            
            // 根据模式决定时间字符串的格式
            const timeStr = showMilliseconds
                ? `${hours}:${minutes}:${seconds}.${milliseconds}` // 带毫秒
                : `${hours}:${minutes}:${seconds}`;                 // 不带毫秒

            try {
                // 4. 并行生成 ASCII 艺术字 (使用 Promise.all 提高效率)
                // figlet.text() 是异步函数，返回 Promise
                const [dateAscii, dayAscii, timeAscii] = await Promise.all([
                    figlet.text(dateStr, FONT_CONFIG),
                    figlet.text(weekdayStr, FONT_CONFIG),
                    figlet.text(timeStr, FONT_CONFIG)
                ]);

                // 5. 批量更新 DOM (一次性更新，减少重绘)
                document.getElementById('date-ascii').textContent = dateAscii;
                document.getElementById('day-ascii').textContent = dayAscii;
                document.getElementById('time-ascii').textContent = timeAscii;
            } catch (err) {
                // 错误处理：如果 figlet 加载失败（通常是因为字体文件路径问题）
                console.error('ASCII生成失败：', err);
                // 降级方案：如果生成失败，至少显示普通文本
                document.getElementById('time-ascii').textContent = timeStr;
            }
        }

        // ==================== 定时器控制 ====================

        /**
         * 重启时钟定时器
         * 用于在切换模式时，先清除旧定时器，再根据新频率启动新定时器
         */
        function restartClockTimer() {
            // 如果已有定时器在运行，先清除它，防止多重定时器叠加
            if (timerId) {
                clearInterval(timerId);
            }

            // 根据当前模式决定刷新频率
            // 毫秒模式：100ms 刷新一次（人眼能感知流畅的最低间隔）
            // 普通模式：500ms 刷新一次（足够捕捉秒数变化）
            const interval = showMilliseconds ? 100 : 500;
            
            // 启动新的定时器
            timerId = setInterval(updateClock, interval);
        }

        // ==================== 事件监听 ====================

        // 监听按钮点击，切换显示模式
        document.getElementById('mode-toggle').addEventListener('click', () => {
            // 1. 切换状态
            showMilliseconds = !showMilliseconds;
            
            // 2. 立即更新一次画面（不用等定时器间隔）
            updateClock();
            
            // 3. 重启定时器，应用新的刷新频率
            restartClockTimer();
        });

        // ==================== 启动程序 ====================
        
        // 立即执行一次更新，避免页面加载后有空白期
        updateClock();
        
        // 启动定时器，开始周期性刷新
        restartClockTimer();
    </script>
</body>
</html>
